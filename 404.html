<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ページが見つかりません｜KOISHIKAWA</title>
  <meta name="robots" content="noindex" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=Noto+Serif+JP:wght@500;600;700&family=Cormorant+Garamond:wght@500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/styles.css" />
  <style>
    .notfound {
      min-height: 80vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 64px 24px;
    }
    .notfound__code {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(72px, 16vw, 140px);
      line-height: 1;
      color: var(--gold, #c9a84c);
      opacity: .18;
      margin-bottom: 16px;
    }
    .notfound__title {
      font-size: 22px;
      font-weight: 600;
      margin-bottom: 12px;
    }
    .notfound__lead {
      color: var(--ink-soft, #888);
      margin-bottom: 40px;
      font-size: 15px;
      line-height: 1.8;
    }
    .notfound__btns {
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
      justify-content: center;
    }
  </style>
</head>
<body>

<header class="site-header" id="top">
  <div class="header-inner">
    <a href="/" class="brand" aria-label="KOISHIKAWA トップへ">
      <span class="brand-mark">KOISHIKAWA</span>
    </a>
    <div class="header-actions">
      <a href="/" class="btn btn-ghost">トップへ戻る</a>
      <a href="/#contact" class="btn btn-gold">無料相談する</a>
    </div>
  </div>
</header>

<main>
  <div class="notfound">
    <div class="notfound__code" aria-hidden="true">404</div>
    <h1 class="notfound__title">ページが見つかりません</h1>
    <p class="notfound__lead">
      お探しのページは移動・削除されたか、URLが間違っている可能性があります。<br />
      トップページからご確認ください。
    </p>
    <div class="notfound__btns">
      <a href="/" class="btn btn-gold">トップページへ</a>
      <a href="/#contact" class="btn btn-ghost">お問い合わせ</a>
    </div>
  </div>
</main>

<footer class="site-footer">
  <div class="footer-inner">
    <div class="footer-bottom">
      <nav class="footer-legal" aria-label="法的情報ナビゲーション">
        <a href="/tokusho/">特定商取引法に基づく表記</a>
        <a href="https://koishikawa.co.jp/privacy" target="_blank" rel="noopener noreferrer">プライバシーポリシー</a>
      </nav>
      <p class="footer-copy">© 株式会社コイシカワ</p>
    </div>
  </div>
</footer>

<script>
window.addEventListener('DOMContentLoaded', () => {
  const header = document.querySelector('.site-header');
  window.addEventListener('scroll', () => {
    header.classList.toggle('is-scrolled', window.scrollY > 8);
  }, { passive: true });
});
</script>
</body>
</html>
